services:
  web:
    image: k3tab
    build:
      context: .
      dockerfile: ./.docker/php/dev.Dockerfile
    volumes:
      - .:/var/www:cached
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=k3tab2025
      - DB_USERNAME=root
      - DB_PASSWORD=root
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["php-fpm"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/.migrated"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    networks:
      - laravel

  nginx:
    image: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www:ro
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - laravel

  db:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - .docker/db/data:/var/lib/postgresql/data
      - .docker/logs:/var/log/postgresql
      - .docker/db/sql:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: k3tab2025
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d k3tab2025"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - laravel

  vite:
    image: node:20
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: bash -c "npm install && npm run dev"
    ports:
      - 5173:5173
    networks:
      - laravel

  queue:
    image: k3tab
    build:
      context: .
      dockerfile: ./.docker/php/dev.Dockerfile
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    command: php artisan queue:work
    networks:
      - laravel
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=k3tab2025
      - DB_USERNAME=root
      - DB_PASSWORD=root

networks:
  laravel:
    driver: bridge

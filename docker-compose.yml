services:
  web:
    image: k3tab
    build:
      context: .
      dockerfile: ./.docker/php/prod.Dockerfile
      network: host
    volumes:
      - app_data:/var/www
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["php-fpm"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/.migrated"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
  queue:
    image: k3tab
    build:
      context: .
      dockerfile: ./.docker/php/prod.Dockerfile
      network: host
    volumes:
      - app_data:/var/www
    restart: always
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    command: php artisan queue:work
    env_file:
      - .env.docker
  nginx:
    image: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - app_data:/var/www:ro
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
  db:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - .docker/db/data:/var/lib/postgresql/data
      - .docker/logs:/var/log/postgresql
      - .docker/db/sql:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: k3tab2025
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d k3tab2025"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  app_data:
